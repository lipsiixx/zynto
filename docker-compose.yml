services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tgguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    # DATABASE_URL и REDIS_URL переопределяем на имена сервисов внутри сети compose
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/tgguard
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
      # proxies.txt не в образе (секреты) — монтируем с хоста, если есть
      - ./proxies.txt:/app/proxies.txt:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  redisdata:
